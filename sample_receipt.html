<!DOCTYPE html>
<html>

<head>
    <title>Sample Receipt</title>
</head>

<body
    style="background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div style="
        font-family: 'Courier New', monospace; 
        width: 300px; 
        padding: 40px; 
        background: white; 
        color: black; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        transform: rotate(-1deg);
    ">
        <h2 style="text-align: center; margin-bottom: 5px;">STARBUCKS COFFEE</h2>
        <p style="text-align: center; font-size: 12px; margin-top: 0;">1234 Tech Park, San Francisco</p>

        <div style="border-bottom: 2px dashed #000; margin: 20px 0;"></div>

        <p><strong>Date:</strong> 04/01/2026</p>
        <p><strong>Time:</strong> 08:30 AM</p>

        <div style="border-bottom: 1px solid #000; margin: 10px 0;"></div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span>Cappuccino (Grande)</span>
            <span>$5.50</span>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span>Croissant</span>
            <span>$4.25</span>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span>Banana Bread</span>
            <span>$3.75</span>
        </div>

        <div style="border-bottom: 2px dashed #000; margin: 20px 0;"></div>

        <div style="display: flex; justify-content: space-between; font-size: 18px; font-weight: bold;">
            <span>TOTAL</span>
            <span>$13.50</span>
        </div>

        <div style="border-bottom: 2px dashed #000; margin: 20px 0;"></div>

        <p style="text-align: center; margin-top: 30px; font-size: 14px;">Thank you for your visit!</p>
        <div style="text-align: center; margin-top: 20px;">
            <div style="display: inline-block; background: black; height: 30px; width: 200px;"></div>
        </div>
    </div>

</body>

</html>
